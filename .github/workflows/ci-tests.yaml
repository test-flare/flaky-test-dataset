name: Continuous Integration Tests (pytest)

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  build:
    name: CI tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.14
    - name: Install dependencies
      run: |
          python --version
          python -m pip install --upgrade pip
          pip install -e .
          pip install -e .[test]
    - name: Test with pytest
      run:  pytest
